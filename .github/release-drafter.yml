name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
prerelease-template: "$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
exclude-labels:
  - "skip-changelog"

categories:
  - title: "New"
    labels:
      - "feat"
      - "feature"
      - "starter"
      - "api"
      - "store"
  - title: "Fix"
    labels:
      - "fix"
      - "bug"
  - title: "Breaking Changes"
    labels:
      - "breaking"
  - title: "Docs"
    labels:
      - "docs"
      - "documentation"
  - title: "Refactor"
    labels:
      - "refactor"
  - title: "Chore"
    labels:
      - "chore"
      - "ci"
      - "build"
      - "deps"
  - title: "Security"
    labels:
      - "security"
      - "vulnerability"

template: |
  ## Summary
  - 

  ## Breaking Changes
  - 

  ## Notes
  - 

version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feat"
      - "feature"
  patch:
    labels:
      - "fix"
      - "bug"
      - "docs"
      - "refactor"
      - "chore"
      - "ci"
      - "build"
      - "deps"
  default: patch
