name: Plugin Policy Engine CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: plugin-policy-engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Upload test reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-policy-engine-test-reports
          path: |
            build/reports/tests/test
            */build/reports/tests/test
